<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CODEBRAIN</title>
<style>
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
  --border: #30363d; --text: #c9d1d9; --text2: #8b949e;
  --accent: #58a6ff; --green: #3fb950; --red: #f85149;
  --orange: #d2991d;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; overflow:hidden; }

.sidebar { width:220px; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
.sidebar-brand { padding:16px; border-bottom:1px solid var(--border); }
.sidebar-brand h1 { font-size:14px; font-weight:600; color:var(--accent); }
.sidebar-brand span { font-size:11px; color:var(--text2); }
.sidebar-nav { flex:1; overflow-y:auto; padding:8px; }
.nav-item { display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:6px; cursor:pointer; font-size:13px; color:var(--text2); margin-bottom:2px; }
.nav-item:hover,.nav-item.active { background:var(--bg3); color:var(--text); }

.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.header { padding:8px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px; font-size:12px; color:var(--text2); }
.header input { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:5px 10px; color:var(--text); font-size:12px; width:170px; outline:none; }
.header input:focus { border-color:var(--accent); }
.header select { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:4px 8px; color:var(--text); font-size:11px; }
.content { flex:1; overflow-y:auto; padding:20px; }

.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
.stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:16px; }
.stat-card .label { font-size:11px; color:var(--text2); margin-bottom:4px; }
.stat-card .value { font-size:24px; font-weight:600; }
.stat-card .sub { font-size:11px; color:var(--text2); margin-top:4px; }

.panels { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.panel { background:var(--bg2); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.panel-header { padding:10px 14px; border-bottom:1px solid var(--border); font-size:12px; font-weight:600; color:var(--text2); }
.panel-body { padding:8px 0; }

.hot-item { display:flex; align-items:center; gap:10px; padding:8px 14px; cursor:pointer; font-size:13px; }
.hot-item:hover { background:var(--bg3); }
.hot-rank { width:22px; text-align:center; font-weight:600; color:var(--text2); }
.hot-rank.r1 { color:var(--red); } .hot-rank.r2 { color:var(--orange); } .hot-rank.r3 { color:#a371f7; }
.hot-count { font-size:11px; color:var(--text2); min-width:30px; text-align:right; }

.tree { font-size:13px; }
.tree-group { margin:6px 0; }
.tree-folder-header { padding:6px 14px; cursor:pointer; display:flex; align-items:center; gap:6px; user-select:none; }
.tree-folder-header:hover { background:var(--bg3); }
.tree-folder-header:active { opacity:.7; }
.tree-folder { margin:6px 8px; }
.tree-folder-bordered { border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.tree-folder-nested { margin-left:16px; }
.tree-toggle { cursor:pointer; font-size:14px; user-select:none; }
.tree-item { padding:6px 14px; cursor:pointer; display:flex; align-items:center; gap:6px; margin:2px 8px 2px 16px; border:1px solid var(--border); border-radius:6px; }
.tree-item:hover { background:var(--bg3); border-color:var(--accent); }
.tree-icon { font-size:14px; }
.tree-count { font-size:11px; color:var(--text2); }
.tree-children { padding:0 0 4px 0; }
.tree-children.collapsed { display:none; }
.tree-suppressed { color:var(--text2); text-decoration:line-through; }

.detail { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:20px; max-width:700px; }
.detail h2 { font-size:16px; margin-bottom:4px; }
.detail-meta { font-size:12px; color:var(--text2); margin-bottom:16px; display:flex; gap:16px; flex-wrap:wrap; }
.solution { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:12px 14px; margin-bottom:8px; }
.solution-badge { font-size:10px; padding:2px 6px; border-radius:8px; margin-right:8px; }
.solution-badge.ok { background:#1a3a1a; color:var(--green); }
.solution-badge.warn { background:#3a2a0a; color:var(--orange); }
.solution-badge.suppress { background:#3a1a1a; color:var(--red); }
.solution-field { margin-top:6px; font-size:12px; }
.solution-field .key { color:var(--text2); margin-right:4px; }
.trace { font-size:11px; color:var(--text2); margin-top:6px; padding:4px 8px; background:var(--bg); border-radius:4px; }
.tag { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; background:var(--bg3); color:var(--text2); margin-right:4px; }
.back { font-size:12px; color:var(--accent); cursor:pointer; margin-bottom:12px; display:inline-block; }

.detail-actions { display:flex; gap:8px; margin:16px 0; }
.detail-actions button { background:var(--bg3); border:1px solid var(--border); border-radius:6px; color:var(--text); cursor:pointer; font-size:12px; padding:6px 14px; }
.detail-actions button:hover { border-color:var(--accent); color:var(--accent); }
.detail-actions button.warn:hover { border-color:var(--orange); color:var(--orange); }
.detail-actions button.danger:hover { border-color:var(--red); color:var(--red); }

.settings { max-width:640px; }
.setting-group { margin-bottom:20px; }
.setting-group-title { font-size:11px; color:var(--text2); text-transform:uppercase; margin-bottom:8px; font-weight:600; }
.setting-card { background:var(--bg2); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.daemon-status { padding:14px 16px; display:flex; align-items:center; gap:8px; }
.setting-rows { padding:4px 0; }
.setting-row { display:flex; justify-content:space-between; align-items:center; padding:8px 16px; font-size:13px; }
.setting-row span:first-child { color:var(--text2); }
.setting-input { background:var(--bg3); border:1px solid var(--border); border-radius:4px; color:var(--text); font-size:12px; padding:3px 8px; width:200px; font-family:monospace; }
.setting-input:focus { border-color:var(--accent); outline:none; }
.setting-input.short { width:160px; }
.setting-save { margin-top:12px; display:flex; gap:8px; align-items:center; }
.setting-save button { background:var(--accent); border:none; border-radius:4px; color:#fff; cursor:pointer; font-size:12px; padding:6px 16px; }

.toggle-switch { position:relative; width:36px; height:20px; cursor:pointer; }
.toggle-switch input { display:none; }
.toggle-slider { position:absolute; top:0;left:0;right:0;bottom:0; background:var(--bg3); border:1px solid var(--border); border-radius:10px; transition:.2s; }
.toggle-slider::after { content:''; position:absolute; top:2px; left:2px; width:14px; height:14px; background:var(--text2); border-radius:50%; transition:.2s; }
.toggle-switch input:checked + .toggle-slider { background:#1a3a1a; border-color:var(--green); }
.toggle-switch input:checked + .toggle-slider::after { background:var(--green); transform:translateX(16px); }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <h1>CODEBRAIN</h1><span>自进化错误记忆框架</span>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-item active" data-view="dashboard">□ 总览</div>
    <div class="nav-item" data-view="browse">☰ 分类浏览</div>
    <div class="nav-item" data-view="recent">⇧ 最近新增</div>
    <div style="border-top:1px solid var(--border);margin:8px 0;"></div>
    <div class="nav-item" data-view="settings">⚙ 设置</div>
  </nav>
</aside>

<main class="main">
  <div class="header" id="headerBar">
    <span id="hDaemon"></span>
    <span id="hLLM"></span>
    <span id="hEmb"></span>
    <span id="hAdapter"></span>
    <span id="hStorage"></span>
    <span style="flex:1"></span>
    <input type="text" id="search" placeholder="搜索..." oninput="doSearch(this.value)">
    <select id="statusFilter" onchange="doSearch()">
      <option value="all">全部</option><option value="active">活跃</option><option value="suppressed">已抑制</option>
    </select>
  </div>
  <div class="content" id="content"></div>
</main>

<script>
const DATA = [
  { id:'grp-null-access', cat:'runtime/null-access', sum:'Zustand store 空值访问', tmpl:'TypeError: Cannot read properties of null', n:15, status:'active', solutions:[{id:'s1',strategy:'使用可选链 ?. 做安全访问',rootCause:'store 初始状态为 null，直接访问属性',avoidanceHint:'不对 store 返回值做判空就访问属性',v:12,suppressed:false,trace:{cmd:'npm run dev',exit:0,ts:Date.now()-86400000}}], tags:['zustand','typescript'], deps:{react:'19.1'}, first:Date.now()-86400000*30, last:Date.now() },
  { id:'grp-ts-mismatch', cat:'typescript/type-mismatch', sum:'类型不匹配', tmpl:'TS2322: Type is not assignable', n:12, status:'active', solutions:[{id:'s2',strategy:'使用类型断言显式转换或修改变量类型声明',rootCause:'类型声明与赋值不兼容',avoidanceHint:'避免未经过类型检查的直接赋值',v:9,suppressed:false,trace:{cmd:'tsc',exit:2,ts:Date.now()-86400000*7}}], tags:['typescript'], deps:{typescript:'5.6'}, first:Date.now()-86400000*25, last:Date.now()-86400000 },
  { id:'grp-module-not-found', cat:'module/resolve', sum:'模块未找到', tmpl:'Module not found', n:8, status:'active', solutions:[{id:'s3',strategy:'检查 import 路径拼写或确认依赖已安装',rootCause:'模块路径拼写错误或依赖未安装',avoidanceHint:'引用模块前确认路径正确且已 install',v:5,suppressed:false,trace:{cmd:'tsc',exit:2,ts:Date.now()-86400000*5}}], tags:['module'], deps:{}, first:Date.now()-86400000*20, last:Date.now()-86400000*2 },
  { id:'grp-pnpm-native', cat:'build/native', sum:'原生模块编译失败', tmpl:'node-gyp rebuild failed', n:6, status:'active', solutions:[{id:'s4',strategy:'安装 windows-build-tools 或切换纯 JS 替代库',rootCause:'Windows 缺少原生编译工具链',avoidanceHint:'优先使用 sql.js(wasm) 替代 better-sqlite3(native)',v:6,suppressed:false,trace:{cmd:'npm install',exit:1,ts:Date.now()-86400000*3}}], tags:['windows','native'], deps:{}, first:Date.now()-86400000*15,last:Date.now()-86400000 },
  { id:'grp-eslint-unused', cat:'lint/style', sum:'ESLint 未使用变量', tmpl:'no-unused-vars', n:5, status:'deprecated', solutions:[{id:'s5',strategy:'删除变量或添加 _ 前缀忽略规则',rootCause:'声明变量后未使用',avoidanceHint:'写代码时确保变量被使用',v:3,suppressed:true,trace:{cmd:'npm run lint',exit:1,ts:Date.now()-86400000*40}}], tags:['eslint'], deps:{}, first:Date.now()-86400000*50,last:Date.now()-86400000*35 },
  { id:'grp-react-hooks', cat:'framework/react', sum:'React Hooks 规则违反', tmpl:'hooks can only be called inside', n:4, status:'active', solutions:[{id:'s6',strategy:'将条件判断移到 Hook 调用之后',rootCause:'在条件分支内调用了 React Hook',avoidanceHint:'始终在组件顶层调用 Hooks',v:4,suppressed:false,trace:{cmd:'npm run dev',exit:1,ts:Date.now()-86400000*10}}], tags:['react','hooks'], deps:{react:'19.1'}, first:Date.now()-86400000*18,last:Date.now()-86400000*6 },
  { id:'grp-async-await', cat:'runtime/async', sum:'async/await 异常未捕获', tmpl:'UnhandledPromiseRejection', n:3, status:'active', solutions:[{id:'s7',strategy:'添加 try-catch 块或 .catch() 处理',rootCause:'异步操作未处理异常路径',avoidanceHint:'所有 async 函数调用都应有错误处理',v:2,suppressed:false,trace:{cmd:'node server.js',exit:1,ts:Date.now()-86400000*8}}], tags:['async'], deps:{}, first:Date.now()-86400000*12,last:Date.now()-86400000*4 },
  { id:'grp-text-trim', cat:'text/trim', sum:'字符串 trim 遗漏', tmpl:'unexpected whitespace', n:2, status:'active', solutions:[{id:'s8',strategy:'比较前对字符串调用 .trim()',rootCause:'用户输入包含首尾空格',avoidanceHint:'字符串比较前始终 trim()',v:2,suppressed:false,trace:{cmd:'npm test',exit:1,ts:Date.now()-86400000}}], tags:['string'], deps:{}, first:Date.now()-86400000*5,last:Date.now()-86400000 },
];
const SETTINGS = {
  daemon:{ running:true, pid:18444, port:10741, uptime:'2h 34m', memory:'48MB' },
  llm:{ provider:'deepseek', model:'deepseek-v4-flash', baseUrl:'https://api.deepseek.com' },
  embedding:{ provider:'xenova', model:'MiniLM-L6-v2', dimensions:384 },
  storage:{ path:'~/.codebrain/knowledge.db', size:'16KB', groups:1 },
  adapters:{ 'claude-code':true, codex:false, gemini:false, copilot:false },
};

let currentView='dashboard', currentDetail=null;

function render() {
  const d=SETTINGS.daemon;
  const ac=Object.entries(SETTINGS.adapters).filter(([,v])=>v).map(([k])=>k).join(',');
  document.getElementById('hDaemon').innerHTML = (d.running
    ? `<span style="color:var(--green)">●</span> Daemon <span style="font-size:11px">:${d.port}</span>`
    : `<span style="color:var(--red)">●</span> Daemon`);
  document.getElementById('hLLM').textContent = 'LLM: '+SETTINGS.llm.model;
  document.getElementById('hEmb').textContent = 'Emb: '+SETTINGS.embedding.model;
  document.getElementById('hAdapter').textContent = '适配: '+(ac||'无');
  document.getElementById('hStorage').textContent = '存储: '+SETTINGS.storage.size;

  if(currentView==='settings'){ renderSettings(); return; }

  const kw=document.getElementById('search').value.toLowerCase();
  const st=document.getElementById('statusFilter').value;
  let data=DATA.filter(d=>st==='all'||(st==='suppressed'?d.solutions.some(s=>s.suppressed):d.status==='active'));
  if(kw) data=data.filter(d=>d.sum.includes(kw)||d.solutions.some(s=>s.rootCause.includes(kw)||s.strategy.includes(kw))||d.tags.some(t=>t.includes(kw)));

  if(currentDetail){ renderDetail(currentDetail); return; }
  if(currentView==='dashboard') renderDashboard(data);
  else if(currentView==='browse') renderTree(data);
  else if(currentView==='recent') renderRecent(data);
}

function renderDashboard(data) {
  const total=data.reduce((s,d)=>s+d.n,0);
  const month=data.filter(d=>d.first>Date.now()-86400000*30).length;
  const top5=[...data].sort((a,b)=>b.n-a.n).slice(0,5);
  document.getElementById('content').innerHTML=`
    <div class="stats">
      <div class="stat-card"><div class="label">分组总数</div><div class="value">${data.length}</div><div class="sub">本月新增 ${month} 组</div></div>
      <div class="stat-card"><div class="label">累计命中</div><div class="value">${total}</div></div>
      <div class="stat-card"><div class="label">活跃方案</div><div class="value" style="color:var(--green)">${data.filter(d=>d.status==='active').length}</div></div>
      <div class="stat-card"><div class="label">已抑制</div><div class="value" style="color:var(--red)">${data.filter(d=>d.solutions.some(s=>s.suppressed)).length}</div></div>
    </div>
    <div class="panels">
      <div class="panel"><div class="panel-header">Top 高频错误</div><div class="panel-body">
        ${top5.map((d,i)=>`<div class="hot-item" onclick="showDetail('${d.id}')"><span class="hot-rank r${i+1}">${i+1}</span> ${d.sum}<span style="flex:1"></span><span class="hot-count">${d.n}次</span></div>`).join('')}
      </div></div>
      <div class="panel"><div class="panel-header">最近新增</div><div class="panel-body">
        ${data.sort((a,b)=>b.first-a.first).slice(0,5).map(d=>`<div class="hot-item" onclick="showDetail('${d.id}')">${d.sum}<span style="flex:1"></span><span class="hot-count">${new Date(d.first).toLocaleDateString('zh-CN')}</span></div>`).join('')}
      </div></div>
    </div>`;
}

function renderTree(data) {
  const root={name:'',children:new Map(),items:[]};
  for(const d of data){ const p=(d.cat||'other').split('/'); let n=root; for(const s of p){ if(!n.children.has(s)) n.children.set(s,{name:s,children:new Map(),items:[]}); n=n.children.get(s); } n.items.push(d); }

  function renderNode(node, path, depth){
    let h='';
    for(const d of node.items){
      const sup=d.solutions.some(s=>s.suppressed);
      h+=`<div class="tree-item"><span class="tree-icon">${sup?'📄':'📝'}</span> <span onclick="showDetail('${d.id}')">${d.sum}</span><span style="flex:1"></span><span class="tree-count">${d.n}次</span></div>`;
    }
    for(const[,child] of node.children){
      const total=countItems(child);
      const cp=path?`${path}/${child.name}`:child.name;
      const cls = depth===0 ? 'tree-folder tree-folder-bordered' : 'tree-folder tree-folder-bordered tree-folder-nested';
      h+=`<div class="${cls}"><div class="tree-folder-header" onclick="toggleNode('${cp}')"><span class="tree-toggle" id="toggle-${cp}">📁</span> <span style="color:var(--accent);font-weight:500">${child.name}/</span><span style="flex:1"></span><span class="tree-count">${total}</span></div><div class="tree-children collapsed" id="children-${cp}">${renderNode(child, cp, depth+1)}</div></div>`;
    }
    return h;
  }
  function countItems(node){ let n=node.items.length; for(const[,c]of node.children) n+=countItems(c); return n; }

  document.getElementById('content').innerHTML=`<div class="tree">${renderNode(root, '', 0)}</div>`;
}

function renderRecent(data){
  document.getElementById('content').innerHTML=`<div class="panel"><div class="panel-header">按最近活跃排序</div><div class="panel-body">${data.sort((a,b)=>b.last-a.last).slice(0,10).map(d=>`<div class="hot-item" onclick="showDetail('${d.id}')">${d.sum}<span style="flex:1"></span><span class="hot-count">${d.n}次</span><span style="font-size:10px;color:var(--text2)">${new Date(d.last).toLocaleDateString('zh-CN')}</span></div>`).join('')}</div></div>`;
}

function renderDetail(id){
  const d=DATA.find(x=>x.id===id); if(!d) return;
  document.getElementById('content').innerHTML=`
    <span class="back" onclick="showDetail(null)">← 返回</span>
    <div class="detail"><h2>${d.sum}</h2>
      <div class="detail-meta"><span>${d.id}</span><span>${d.cat}</span><span>${d.n}次</span><span class="tag">${d.status}</span>${d.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:16px">${d.tmpl}</div>
      ${d.solutions.map((s,i)=>{const badge=s.suppressed?'<span class="solution-badge suppress">已抑制</span>':s.v>=5?'<span class="solution-badge ok">✓ v'+s.v+'</span>':'<span class="solution-badge warn">v'+s.v+'</span>';
        return`<div class="solution"><div>${badge}方案 ${i+1}</div><div class="solution-field"><span class="key">fix:</span>${s.strategy}</div><div class="solution-field"><span class="key">root:</span>${s.rootCause}</div><div class="solution-field"><span class="key">avoid:</span>${s.avoidanceHint}</div>${s.trace?`<div class="trace">trace: ${s.trace.cmd} (exit ${s.trace.exit}) ${new Date(s.trace.ts).toLocaleString('zh-CN')}</div>`:''}</div>`;
      }).join('')}
      ${d.deps&&Object.keys(d.deps).length>0?`<div style="font-size:11px;color:var(--text2);margin-top:12px">依赖版本: ${Object.entries(d.deps).map(([k,v])=>k+'@'+v).join(', ')}</div>`:''}
      <div class="detail-actions"><button onclick="toggleSuppress('${d.id}')" class="warn">${d.solutions.some(s=>s.suppressed)?'解除抑制':'抑制'}</button><button onclick="forget('${d.id}')" class="danger">删除</button></div>
    </div>`;
}

function renderSettings(){
  const d=SETTINGS.daemon;
  const dot=d.running?'<span style="color:var(--green);font-size:18px">●</span>':'<span style="color:var(--red);font-size:18px">●</span>';
  document.getElementById('content').innerHTML=`
    <div class="settings">
      <div class="setting-group"><div class="setting-group-title">Daemon 状态</div><div class="setting-card">
        <div class="daemon-status">${dot} <span style="font-size:15px;font-weight:600">${d.running?'运行中':'已停止'}</span><span style="flex:1"></span>
          <label class="toggle-switch"><input type="checkbox" ${d.running?'checked':''} onchange="toggleDaemon(this.checked)"><span class="toggle-slider"></span></label>
        </div>
        ${d.running?`<div class="setting-rows"><div class="setting-row"><span>端口</span><span>${d.port}</span></div><div class="setting-row"><span>PID</span><span>${d.pid}</span></div><div class="setting-row"><span>运行时间</span><span>${d.uptime}</span></div><div class="setting-row"><span>内存</span><span>${d.memory}</span></div></div>`:''}
      </div></div>
      <div class="setting-group"><div class="setting-group-title">LLM 配置</div><div class="setting-card"><div class="setting-rows">
        <div class="setting-row"><span>API 地址</span><input class="setting-input" value="${SETTINGS.llm.baseUrl}"></div>
        <div class="setting-row"><span>模型</span><input class="setting-input" value="${SETTINGS.llm.model}"></div>
        <div class="setting-row"><span>API Key</span><input class="setting-input" type="password" value="sk-xxxx"></div>
      </div></div></div>
      <div class="setting-group"><div class="setting-group-title">Embedding</div><div class="setting-card"><div class="setting-rows">
        <div class="setting-row"><span>模型</span><select class="setting-input short"><option>MiniLM-L6-v2</option><option>all-mpnet-base-v2</option></select></div>
        <div class="setting-row"><span>维度</span><span>${SETTINGS.embedding.dimensions}</span></div>
      </div></div></div>
      <div class="setting-group"><div class="setting-group-title">存储</div><div class="setting-card"><div class="setting-rows">
        <div class="setting-row"><span>路径</span><span style="font-size:12px">${SETTINGS.storage.path}</span></div>
        <div class="setting-row"><span>大小</span><span>${SETTINGS.storage.size}</span></div>
        <div class="setting-row"><span>分组</span><span>${SETTINGS.storage.groups}</span></div>
      </div></div></div>
      <div class="setting-group"><div class="setting-group-title">Agent 适配器</div><div class="setting-card"><div class="setting-rows">
        ${['claude-code','codex','gemini','copilot'].map(id=>{
          const labels={ 'claude-code':'Claude Code',codex:'OpenAI Codex CLI',gemini:'Gemini CLI',copilot:'GitHub Copilot' };
          const enabled=!!SETTINGS.adapters[id];
          const installed=id==='claude-code';
          return`<div class="setting-row"><span>${labels[id]}</span><span style="display:flex;align-items:center;gap:10px">${installed?'<span style="font-size:10px;color:var(--green)">已安装</span>':'<span style="font-size:10px;color:var(--text2)">未安装</span>'}<label class="toggle-switch" ${!installed?'style="opacity:.3;pointer-events:none"':''}><input type="checkbox" ${enabled&&installed?'checked':''} ${!installed?'disabled':''} onchange="SETTINGS.adapters['${id}']=this.checked"><span class="toggle-slider"></span></label></span></div>`;
        }).join('')}
      </div></div></div>
      <div class="setting-save"><button onclick="saveSettings()">保存配置</button><span id="save-msg" style="font-size:12px;color:var(--green);padding:6px;display:none">✓ 已保存</span></div>
    </div>`;
}

function showDetail(id){ currentDetail=id; render(); }
function doSearch(){ render(); }
function toggleNode(path){
  const c=document.getElementById('children-'+path), t=document.getElementById('toggle-'+path);
  if(!c||!t) return;
  const isOpen=!c.classList.contains('collapsed');
  if(isOpen){ c.classList.add('collapsed'); t.textContent='📁'; }
  else{ c.classList.remove('collapsed'); t.textContent='📂'; }
}
function toggleSuppress(id){
  const d=DATA.find(x=>x.id===id); if(!d) return;
  const sup=d.solutions.some(s=>s.suppressed);
  if(sup){ d.solutions.forEach(s=>s.suppressed=false); d.status='active'; }
  else{ d.solutions.forEach(s=>s.suppressed=true); d.status='deprecated'; }
  render();
}
function forget(id){ if(!confirm('删除 '+id+'？')) return; const i=DATA.findIndex(x=>x.id===id); if(i>=0) DATA.splice(i,1); render(); }
function saveSettings(){ const m=document.getElementById('save-msg'); m.style.display='inline'; setTimeout(()=>m.style.display='none',2000); }
function toggleDaemon(on){ SETTINGS.daemon.running=on; if(on){ SETTINGS.daemon.pid=Math.floor(Math.random()*90000+10000); SETTINGS.daemon.port=Math.floor(Math.random()*50000+10000); SETTINGS.daemon.uptime='0m'; } render(); }

document.querySelectorAll('.nav-item').forEach(el=>{ el.addEventListener('click',()=>{ document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active')); el.classList.add('active'); currentView=el.dataset.view; currentDetail=null; render(); }); });
render();
</script>
</body>
</html>
