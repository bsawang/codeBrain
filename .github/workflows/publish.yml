name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Debug .npmrc
        run: |
          echo "--- user .npmrc ---"
          cat ~/.npmrc | sed 's/:_authToken=.*/:_authToken=***/'
          echo "--- project .npmrc ---"
          cat .npmrc 2>/dev/null | sed 's/:_authToken=.*/:_authToken=***/' || echo "(none)"
          echo "--- npm whoami ---"
          npm whoami || echo "AUTH FAILED"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.publish_token }}
