name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure npm
        run: node -e "require('fs').writeFileSync('.npmrc','registry=https://registry.npmjs.org/\n//registry.npmjs.org/:_authToken='+process.env.NPM_TOKEN)"
        env:
          NPM_TOKEN: ${{ secrets.publish_token }}

      - name: Debug config
        run: npm config list

      - name: Debug auth
        run: npm whoami

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public
